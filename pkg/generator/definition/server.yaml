description: Physical servers
group: resources

actions:
  list:
    api-call: admin.ListServers
    description: List all available servers
    root-key: Servers
    fields:
      - Id
      - Name
      - InPool.Boolean
      - PowerState.ServerPowerState
      - ProvisionState.ServerProvisioningState
      - CreatedAt.Date
    params:
      - name: search
        type: string
        description: Optional search term
        required: false

  # search-options returns the set of valid extended-search filter fields and
  # their allowed values. Use it to discover the --filter keys accepted by the
  # "server filter" command (which calls the same ListServers RPC with an
  # ExtendedSearch payload).
  search-options:
    api-call: admin.GetServerSearchOptions
    description: List available extended-search filter options for servers

  list-available:
    api-call: admin.ListAvailableServer
    description: List all available servers
    root-key: Server
    fields:
      - Id
      - Name
      - Datacenter
      - NetboxLink

  import:
    api-call: admin.ImportServer
    description: Import a new server from NetBox to GPCORE
    params:
      - name: netbox_ids
        type: "[]int64"
        description: NetBox IDs of the servers to import
        required: true

  trigger-action:
    api-call: admin.TriggerServerAction
    description: Trigger an action on a server
    params:
      - name: server_id
        type: string
        description: Server UUID
        required: true
      - name: action
        type: cloudv1.ServerAction
        default: cloudv1.SERVER_ACTION_POWER_ON
        description: Action to trigger
        required: true

  get:
    api-call: admin.GetServer
    description: Get server details
    params:
      - name: id
        type: string
        description: Server UUID
        required: true

  update:
    api-call: admin.UpdateServer
    description: Update server details
    params:
      - name: id
        type: string
        description: Server UUID
        required: true
      - name: flavour_id
        type: string
        description: Flavour UUID
        required: true
      - name: server_pool_id
        type: string
        description: Server Pool UUID
        required: false
      # is_broken is deprecated in the gRPC API and intentionally not exposed.
      - name: autofix
        type: bool
        description: Enable the automated monitoring fix job for this server
        default: false
      - name: maintenance
        type: bool
        description: Set or clear maintenance mode
        required: false
      - name: maintenance_reason
        type: string
        description: Reason for maintenance (used when maintenance is true)
        required: false

  delete:
    api-call: admin.DeleteServer
    description: Delete a server
    params:
      - name: id
        type: string
        description: Server UUID
        required: true
      - name: force
        type: bool
        description: Force destroy the server, even if the server is unresponsive
        default: false
        required: true
      - name: skip_clean
        type: bool
        description: Allow deletion without cleaning the device
        default: false

  replace:
    api-call: admin.ReplaceServer
    description: Replace a server with a new one (due to hardware failure)
    params:
      - name: id
        type: string
        description: Server UUID
        required: true
      - name: reason
        type: adminv1.ReplaceServerRequest_ReplaceServerReason
        description: Reason, why the server need to be replaced
        default: adminv1.ReplaceServerRequest_REPLACE_SERVER_REASON_BROKEN
        required: true
      - name: replacement_server_id
        type: string
        description: Replacement server UUID
        required: false

  platform-management:
    api-call: admin.GetServerPlatformManagement
    description: Get server platform management details
    params:
      - name: id
        type: string
        description: Server UUID
        required: true

  issues:
    api-call: admin.ListServerIssues
    description: List server issues across all servers
    root-key: Issues
    params:
      - name: source
        type: cloudv1.ServerIssueSource
        description: Filter by issue source
        optional: true
        required: false
      - name: datacenter_id
        type: string
        description: Filter by datacenter UUID
        required: false
      - name: include_resolved
        type: bool
        description: Include resolved issues
        required: false
        optional: true
      - name: check_name
        type: string
        description: Filter by check name (e.g. device_exists, primary_interface, pm_offline)
        required: false
    fields:
      - Id
      - ServerId
      - Source.ServerIssueSource
      - CheckName
      - Message
      - Resolved.Boolean

  server-issues:
    api-call: admin.GetServerIssues
    description: Get all issues for a specific server
    params:
      - name: server_id
        type: string
        description: Server UUID
        required: true

  validate:
    api-call: admin.ValidateServer
    description: Validate a server and trigger a sync if needed
    params:
      - name: server_id
        type: string
        description: Server UUID
        required: true