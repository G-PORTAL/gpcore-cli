description: Server and admin logs
group: admin

actions:
  server:
    api-call: admin.ListServerLogs
    description: List all server logs
    root-key: Logs
    params:
      - name: id
        type: string
        description: Server ID
        required: true
      - name: search
        type: string
        description: Search for a specific log
    fields:
      - CreatedAt.DateTime
      - Level.ServerLogLevel
      - Source.ServerLogSource
      - Message

  admin:
    api-call: admin.ListAdminLogs
    description: List all admin logs
    root-key: Logs
    params:
      - name: search
        type: string
        description: Optional search term
        required: false
      - name: admin_user_id
        type: string
        description: Filter by admin user UUID
        required: false
      - name: user_id
        type: string
        description: Filter by target user UUID
        required: false
    fields:
      - CreatedAt.DateTime
      - AdminUser.BasicUser
      - TargetUser.BasicUser
      - Message