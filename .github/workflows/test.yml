name: Tests

on: [push]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.0'

      - name: Install dependencies
        run: go mod download

      - name: Generate code
        run: go generate ./...

      - name: Run tests
        run: go test -v ./...
